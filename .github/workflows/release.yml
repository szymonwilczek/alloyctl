# SPDX-License-Identifier: GPL-2.0-only
name: Release

# Tag-triggered release.
#
# alloyctl ships as one portable C binary, so single build serves every distribution:
# this builds it, hashes the artifacts into a SHA256SUMS manifest, signs that manifest
# with cosign keyless (Sigstore OIDC, no secrets), and publishes GitHub Release.
#
# Tag whose commit is on alloy-next but not yet on main (or any tag with pre-release
# suffix such as -rc1) is published as pre-release.
# Once the same commit is part of main it publishes as a normal release.
#
# Only the maintainer pushes tags, so only the maintainer cuts releases.

on:
  push:
    tags:
      - 'v*'

# one release run per tag; never cancel a release that is already publishing
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    name: build and publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the release and upload assets
      id-token: write    # OIDC token for cosign keyless signing
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential libncursesw5-dev pkg-config

      - name: Install nfpm
        # nfpm builds the .deb and .rpm from dist/nfpm.yaml
        # its own apt repo is the maintainer-recommended install path
        run: |
          echo 'deb [trusted=yes] https://repo.goreleaser.com/apt/ /' \
            | sudo tee /etc/apt/sources.list.d/goreleaser.list
          sudo apt-get update
          sudo apt-get install -y nfpm

      - name: Confirm the tag matches VERSION
        # check-version-tag fails when the tag (vX.Y.Z) does not equal the VERSION file,
        # so release cannot ship a version that disagrees with its tag
        run: make check-version-tag

      - name: Build
        run: make

      - name: Stage artifacts and hash manifest
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -eu
          ver="${TAG#v}"
          dist="alloyctl-${ver}-linux-x86_64"
          scripts/stage-release "$ver" release
          scripts/build-packages "$ver" release
          (cd release && sha256sum \
            alloyctl "${dist}.tar.gz" \
            "alloyctl_${ver}_amd64.deb" "alloyctl-${ver}.x86_64.rpm" \
            PKGBUILD > SHA256SUMS)
          cat release/SHA256SUMS

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign the manifest (keyless)
        # GitHub's OIDC token mints ephemeral Sigstore certificate bound to
        # this workflow's identity; self-contained bundle carries the certificate
        # and transparency-log proof, so verification needs no key distribution,
        # only the workflow identity and the OIDC issuer
        run: |
          cosign sign-blob --yes \
            --bundle release/SHA256SUMS.cosign.bundle \
            release/SHA256SUMS

      - name: Publish the release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -eu

          # pre-release unless the tagged commit is already part of main
          # -rc (or any suffix) tag is always pre-release
          git fetch --no-tags --quiet origin main || true
          prerelease="--prerelease"
          ver="${TAG#v}"
          case "$ver" in
            *-*) prerelease="--prerelease" ;;
            *)
              if git merge-base --is-ancestor "$GITHUB_SHA" FETCH_HEAD 2>/dev/null; then
                prerelease=""
              fi
              ;;
          esac

          body="$(git log -1 --format=%b "$GITHUB_SHA" \
            | grep -viE '^(signed-off-by|co-authored-by|acked-by|reviewed-by|tested-by|reported-by|cc):')"
          notes="Portable Linux x86_64 build of alloyctl $TAG."
          notes="$notes"$'\n\n'"Install: portable tarball, the .deb (Debian/Ubuntu), the .rpm (Fedora/RHEL), or the attached PKGBUILD (Arch/AUR)."
          if [ -n "$body" ]; then
            notes="$notes"$'\n\n'"$body"
          fi
          notes="$notes"$'\n\n'"Verify with: cosign verify-blob --bundle SHA256SUMS.cosign.bundle SHA256SUMS && sha256sum -c SHA256SUMS."

          gh release create "$TAG" \
            release/alloyctl release/*.tar.gz \
            release/*.deb release/*.rpm release/PKGBUILD \
            release/SHA256SUMS release/SHA256SUMS.cosign.bundle \
            --title "$TAG" \
            --notes "$notes" \
            $prerelease

      - name: Hand the AUR recipe to the publish job
        if: ${{ !contains(github.ref_name, '-') }}
        uses: actions/upload-artifact@v7
        with:
          name: aur-recipe
          path: |
            release/PKGBUILD
            release/.SRCINFO
          include-hidden-files: true

  publish-aur:
    name: publish to the AUR
    needs: release
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    steps:
      - name: Download the AUR recipe
        uses: actions/download-artifact@v8
        with:
          name: aur-recipe
          path: recipe

      - name: Push the recipe to the AUR
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          TAG: ${{ github.ref_name }}
        run: |
          set -eu
          if [ -z "${AUR_SSH_PRIVATE_KEY:-}" ]; then
            echo "AUR_SSH_PRIVATE_KEY not set; skipping AUR publish"
            exit 0
          fi

          mkdir -p ~/.ssh
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan -t ed25519,rsa aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/aur -o IdentitiesOnly=yes"

          git clone ssh://aur@aur.archlinux.org/alloyctl-bin.git aur
          cp recipe/PKGBUILD recipe/.SRCINFO aur/
          cd aur
          git config user.name "alloyctl release bot"
          git config user.email "swilczek.lx@gmail.com"
          if git diff --quiet; then
            echo "AUR already up to date"
            exit 0
          fi
          git add PKGBUILD .SRCINFO
          git commit -m "Update to ${TAG#v}"
          git push
