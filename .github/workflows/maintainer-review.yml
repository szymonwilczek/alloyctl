# SPDX-License-Identifier: GPL-2.0-only
name: Maintainer review request

# Request review from the maintainer of every driver a pull request touches,
# so GitHub notifies them -- unless they opened the pull request themselves.
#
# Uses pull_request_target so the GITHUB_TOKEN can write (request reviews) even
# on pull requests from forks, where a pull_request token is read-only.
#
# This is safe because the job never checks out or runs the pull request's code:
# it reads the trusted base MAINTAINERS and scripts/get-maintainer,
# and pulls the changed files from the API only.

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: maintainer-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  request-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Check out the base repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Request maintainer reviews
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          set -euo pipefail

          gh api --paginate "repos/$REPO/pulls/$PR/files" \
            --jq '.[].filename' > changed.txt
          scripts/get-maintainer --github < changed.txt \
            | sort -u | grep -vixF "$AUTHOR" > reviewers.txt || true

          if [[ ! -s reviewers.txt ]]; then
            echo "No maintainers to notify for this pull request."
            exit 0
          fi
          echo "Maintainers to notify:"; sed 's/^/  /' reviewers.txt

          # request each review individually so one non-collaborator
          # (which the API rejects) does not block the others;
          # fall back to an @-mention comment for anyone who could not be added as a reviewer.
          mention=""
          while IFS= read -r user; do
            [[ -z $user ]] && continue
            if gh pr edit "$PR" --add-reviewer "$user" 2>edit.err; then
              echo "Requested review from @$user"
            else
              echo "Could not add @$user as a reviewer:"; sed 's/^/  /' edit.err
              mention+=" @$user"
            fi
          done < reviewers.txt

          if [[ -n $mention ]]; then
            gh pr comment "$PR" --body \
              "Review requested from${mention} -- maintainer(s) of a driver this pull request touches (see MAINTAINERS)."
          fi
