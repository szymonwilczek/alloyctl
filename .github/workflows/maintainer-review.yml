# SPDX-License-Identifier: GPL-2.0-only
name: Maintainer review request

# Complements .github/CODEOWNERS.
#
# CODEOWNERS natively requests review from driver's maintainer -- but only if that
# maintainer is a repository collaborator;
# GitHub silently ignores code owners without access.
#
# This workflow covers exactly that gap:
# it @-mentions, in a comment, any maintainer of a changed file who is NOT a collaborator
# (and is not the PR author), so community maintainer without push access still gets pinged.
#
# Uses pull_request_target so the token can comment on fork pull requests.
#
# It never checks out or runs the pull request's code:
# it reads the trusted base MAINTAINERS and scripts/get-maintainer,
# and the changed files from the API.

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: maintainer-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  mention-non-collaborators:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Check out the base repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Mention maintainers CODEOWNERS cannot reach
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          set -euo pipefail

          gh api --paginate "repos/$REPO/pulls/$PR/files" \
            --jq '.[].filename' > changed.txt
          scripts/get-maintainer --github < changed.txt \
            | sort -u | grep -vixF "$AUTHOR" > candidates.txt || true

          if [[ ! -s candidates.txt ]]; then
            echo "No maintainers to consider."
            exit 0
          fi

          # Collaborator is already review-requested by CODEOWNERS;
          # Only ping the rest.
          # If the access check fails for any reason, err toward mentioning
          # so maintainer is never silently dropped
          mention=""
          while IFS= read -r user; do
            [[ -z $user ]] && continue
            if gh api "repos/$REPO/collaborators/$user" >/dev/null 2>&1; then
              echo "@$user is a collaborator; CODEOWNERS handles the request"
            else
              echo "@$user is not a collaborator; will mention"
              mention+=" @$user"
            fi
          done < candidates.txt

          if [[ -n $mention ]]; then
            gh pr comment "$PR" --body \
              "Review requested from${mention} -- maintainer(s) of a driver this pull request touches (see MAINTAINERS). You are not a repository collaborator, so CODEOWNERS could not request you automatically."
          fi
