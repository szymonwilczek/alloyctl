# SPDX-License-Identifier: GPL-2.0-only
name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cc: [gcc, clang]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libncursesw5-dev pkg-config
      - name: Build
        run: make CC=${{ matrix.cc }}
      - name: Unit tests
        run: make CC=${{ matrix.cc }} test

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format
      - name: Check formatting
        run: make check-format

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libncursesw5-dev pkg-config
      - name: Build
        run: make
      - name: Stage the release tarball
        run: scripts/stage-release "$(cat VERSION)" release
      - name: Install from the unpacked tarball and verify
        run: |
          set -eu
          ver="$(cat VERSION)"
          dist="alloyctl-${ver}-linux-x86_64"
          work="$RUNNER_TEMP/pkg"
          root="$RUNNER_TEMP/root"
          rm -rf "$work" "$root"
          mkdir -p "$work"
          tar -xzf "release/${dist}.tar.gz" -C "$work"
          cd "$work/$dist"

          sudo env DESTDIR="$root" ./install.sh --prefix /usr
          test -x "$root/usr/bin/alloyctl"
          test -f "$root/usr/lib/udev/rules.d/70-alloyctl-uinput.rules"
          echo "install: binary and udev rule present"

          sudo env DESTDIR="$root" ./install.sh --prefix /usr --uninstall
          test ! -e "$root/usr/bin/alloyctl"
          test ! -e "$root/usr/lib/udev/rules.d/70-alloyctl-uinput.rules"
          echo "uninstall: both removed"

  codeowners:
    # .github/CODEOWNERS is generated from MAINTAINERS
    # Fail if it drifted
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Check CODEOWNERS is in sync with MAINTAINERS
        run: make check-codeowners

  sanitizers:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        san: [asan, ubsan, tsan]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libncursesw5-dev pkg-config
      - name: Run unit tests under ${{ matrix.san }}
        run: make test-${{ matrix.san }}

  valgrind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libncursesw5-dev pkg-config valgrind
      - name: Memcheck the unit tests
        run: make test-valgrind

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Install documentation toolchain
        run: pip install -r Documentation/requirements.txt
      - name: Build documentation (strict)
        run: make htmldocs
      - name: Lint reStructuredText
        run: make checkdocs

  patch-quality:
    if: github.event_name == 'pull_request' && github.event.pull_request.user.type != 'Bot'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libncursesw5-dev pkg-config clang-format
      - name: Check patch quality
        run: scripts/check-patch "${{ github.event.pull_request.base.sha }}" HEAD
