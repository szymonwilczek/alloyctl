# SPDX-License-Identifier: GPL-2.0-only
name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cc: [gcc, clang]
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libncursesw5-dev pkg-config
      - name: Build
        run: make CC=${{ matrix.cc }}
      - name: Unit tests
        run: make CC=${{ matrix.cc }} test

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format
      - name: Check formatting
        run: make check-format

  drivers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libncursesw5-dev pkg-config
      - name: Build a single-driver subset and check the registry
        run: |
          set -eu
          one=$(make list-drivers | head -n1)
          echo "building only: $one"
          make DRIVERS="$one"
          # exactly one supported device family must be compiled in
          got=$(./alloyctl --list | grep -cE '^  [0-9a-f]{4}:')
          test "$got" -ge 1
          ./alloyctl --list
      - name: Unknown driver name must fail the build
        run: |
          set -eu
          if make DRIVERS="__no_such_driver__" 2>err.log; then
            echo "expected failure for unknown driver" >&2
            exit 1
          fi
          grep -q "unknown driver" err.log
      - name: Default build still links every driver
        run: |
          set -eu
          make clean
          make
          all=$(make list-drivers | wc -l)
          echo "driver directories: $all"
          test "$all" -ge 1

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libncursesw5-dev pkg-config
      - name: Build
        run: make
      - name: Stage the release tarball
        run: scripts/stage-release "$(cat VERSION)" release
      - name: Install from the unpacked tarball and verify
        run: |
          set -eu
          ver="$(cat VERSION)"
          dist="alloyctl-${ver}-linux-x86_64"
          work="$RUNNER_TEMP/pkg"
          root="$RUNNER_TEMP/root"
          rm -rf "$work" "$root"
          mkdir -p "$work"
          tar -xzf "release/${dist}.tar.gz" -C "$work"
          cd "$work/$dist"

          sudo env DESTDIR="$root" ./install.sh --prefix /usr
          test -x "$root/usr/bin/alloyctl"
          test -f "$root/usr/lib/udev/rules.d/70-alloyctl-uinput.rules"
          echo "install: binary and udev rule present"

          sudo env DESTDIR="$root" ./install.sh --prefix /usr --uninstall
          test ! -e "$root/usr/bin/alloyctl"
          test ! -e "$root/usr/lib/udev/rules.d/70-alloyctl-uinput.rules"
          echo "uninstall: both removed"
      - name: Install nfpm
        run: |
          echo 'deb [trusted=yes] https://repo.goreleaser.com/apt/ /' \
            | sudo tee /etc/apt/sources.list.d/goreleaser.list
          sudo apt-get update
          sudo apt-get install -y nfpm
      - name: Build the .deb, .rpm and PKGBUILD and check their contents
        run: |
          set -eu
          ver="$(cat VERSION)"
          scripts/build-packages "$ver" release
          deb="release/alloyctl_${ver}_amd64.deb"
          rpm="release/alloyctl-${ver}.x86_64.rpm"

          # both packages must carry the binary and both udev rules
          for f in /usr/bin/alloyctl \
            /usr/lib/udev/rules.d/70-alloyctl-uinput.rules \
            /usr/lib/udev/rules.d/71-alloyctl-hidraw.rules; do
            dpkg-deb -c "$deb" | grep -q " \.$f\$" \
              || { echo "deb missing $f" >&2; exit 1; }
            rpm -qlp "$rpm" | grep -qx "$f" \
              || { echo "rpm missing $f" >&2; exit 1; }
          done
          echo "deb/rpm: binary and both udev rules present"

          # AUR recipe's checksum must match the staged tarball
          sha=$(sha256sum "release/alloyctl-${ver}-linux-x86_64.tar.gz" \
            | cut -d' ' -f1)
          grep -q "sha256sums=('${sha}')" release/PKGBUILD \
            || { echo "PKGBUILD checksum does not match tarball" >&2; exit 1; }
          grep -q "sha256sums = ${sha}" release/.SRCINFO \
            || { echo ".SRCINFO checksum does not match tarball" >&2; exit 1; }
          echo "PKGBUILD/.SRCINFO: checksum matches tarball"

  codeowners:
    # .github/CODEOWNERS is generated from MAINTAINERS
    # Fail if it drifted
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Check CODEOWNERS is in sync with MAINTAINERS
        run: make check-codeowners

  sanitizers:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        san: [asan, ubsan, tsan]
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libncursesw5-dev pkg-config
      - name: Run unit tests under ${{ matrix.san }}
        run: make test-${{ matrix.san }}

  valgrind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libncursesw5-dev pkg-config valgrind
      - name: Memcheck the unit tests
        run: make test-valgrind

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Install documentation toolchain
        run: pip install -r Documentation/requirements.txt
      - name: Build documentation (strict)
        run: make htmldocs
      - name: Lint reStructuredText
        run: make checkdocs

  patch-quality:
    if: github.event_name == 'pull_request' && github.event.pull_request.user.type != 'Bot'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libncursesw5-dev pkg-config clang-format
      - name: Check patch quality
        continue-on-error: ${{ contains(github.event.pull_request.labels.*.name, 'merge-release') }}
        run: scripts/check-patch "${{ github.event.pull_request.base.sha }}" HEAD
